<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Tree Editor</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Top Navigation Bar -->
    <header class="navbar">
        <div class="navbar-left">
            <svg class="navbar-icon" viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
            <h1 class="navbar-title">Family Tree Editor</h1>
        </div>
        <div class="navbar-center">
            <span class="tree-stats" id="treeStats">Людей в древе: 0</span>
        </div>
        <div class="navbar-right">
            <button class="btn btn-outline" id="btnImport" title="Загрузить бекап">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
                <span>Загрузить</span>
            </button>
            <button class="btn btn-outline" id="btnExport" title="Сохранить бекап">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="17 8 12 3 7 8"/>
                    <line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
                <span>Сохранить</span>
            </button>
            <button class="btn btn-primary" id="btnNewTree" title="Новое древо">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="5" x2="12" y2="19"/>
                    <line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                <span>Новое древо</span>
            </button>
        </div>
    </header>

    <!-- Hidden file input for import -->
    <input type="file" id="fileInput" accept=".json" style="display: none;">

    <!-- Main Content Area -->
    <main class="main-content">
        <!-- Tree Canvas Area -->
        <div class="tree-container" id="treeContainer">
            <div class="tree-viewport" id="treeViewport">
                <svg class="tree-connections" id="treeConnections"></svg>
                <div class="tree-nodes" id="treeNodes"></div>
            </div>

            <!-- Welcome Screen -->
            <div class="welcome-screen" id="welcomeScreen">
                <div class="welcome-card">
                    <svg viewBox="0 0 24 24" width="64" height="64" fill="none" stroke="#4A7DFF" stroke-width="1.5">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                        <circle cx="9" cy="7" r="4"/>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                    </svg>
                    <h2>Добро пожаловать в Family Tree Editor</h2>
                    <p>Создайте новое семейное древо или загрузите существующий бекап</p>
                    <div class="welcome-actions">
                        <button class="btn btn-primary btn-lg" id="btnStartNew">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="12" y1="5" x2="12" y2="19"/>
                                <line x1="5" y1="12" x2="19" y2="12"/>
                            </svg>
                            Создать новое древо
                        </button>
                        <button class="btn btn-outline btn-lg" id="btnLoadBackup">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                <polyline points="7 10 12 15 17 10"/>
                                <line x1="12" y1="15" x2="12" y2="3"/>
                            </svg>
                            Загрузить бекап
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tree Controls (right side) -->
        <div class="tree-controls" id="treeControls">
            <button class="control-btn" id="btnZoomIn" title="Приблизить">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="5" x2="12" y2="19"/>
                    <line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
            </button>
            <button class="control-btn" id="btnZoomOut" title="Отдалить">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
            </button>
            <button class="control-btn" id="btnFitScreen" title="Вписать в экран">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="15 3 21 3 21 9"/>
                    <polyline points="9 21 3 21 3 15"/>
                    <line x1="21" y1="3" x2="14" y2="10"/>
                    <line x1="3" y1="21" x2="10" y2="14"/>
                </svg>
            </button>
        </div>

        <!-- Save as Image Button -->
        <button class="save-image-btn" id="btnSaveImage">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                <circle cx="8.5" cy="8.5" r="1.5"/>
                <polyline points="21 15 16 10 5 21"/>
            </svg>
            Сохранить как изображение
        </button>

        <!-- Person Detail Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button class="sidebar-edit-btn" id="btnEditPerson" title="Редактировать">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                    </svg>
                </button>
                <button class="sidebar-close-btn" id="btnCloseSidebar" title="Закрыть">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>

            <!-- View Mode -->
            <div class="sidebar-view" id="sidebarView">
                <div class="person-avatar-large" id="personAvatar">
                    <svg class="avatar-placeholder" viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="#94a3b8" stroke-width="1.5">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                </div>
                <h2 class="person-name" id="personName"></h2>
                <div class="person-dates" id="personDates"></div>

                <div class="sidebar-section">
                    <div class="section-header">
                        <h3>Родственники</h3>
                        <button class="section-add-btn" id="btnAddRelative">Добавить</button>
                    </div>
                    <div class="relatives-list" id="relativesList"></div>
                </div>

                <div class="sidebar-section">
                    <div class="section-header">
                        <h3>События</h3>
                    </div>
                    <div class="events-list" id="eventsList"></div>
                </div>

                <div class="sidebar-section">
                    <div class="section-header">
                        <h3>Биография</h3>
                    </div>
                    <p class="biography-text" id="biographyText">Нет информации</p>
                </div>

                <div class="sidebar-section sidebar-danger">
                    <button class="btn btn-danger btn-sm" id="btnDeletePerson">
                        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="3 6 5 6 21 6"/>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                        </svg>
                        Удалить персону
                    </button>
                </div>
            </div>

            <!-- Edit Mode -->
            <div class="sidebar-edit" id="sidebarEdit" style="display: none;">
                <h3 class="edit-title" id="editTitle">Редактирование</h3>
                <form id="personForm">
                    <div class="form-group">
                        <label>Имя</label>
                        <input type="text" id="editFirstName" placeholder="Введите имя" required>
                    </div>
                    <div class="form-group">
                        <label>Фамилия</label>
                        <input type="text" id="editLastName" placeholder="Введите фамилию">
                    </div>
                    <div class="form-group">
                        <label>Отчество</label>
                        <input type="text" id="editMiddleName" placeholder="Введите отчество">
                    </div>
                    <div class="form-group">
                        <label>Пол</label>
                        <div class="gender-selector">
                            <button type="button" class="gender-btn" data-gender="male" id="genderMale">М</button>
                            <button type="button" class="gender-btn" data-gender="female" id="genderFemale">Ж</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Дата рождения</label>
                        <input type="date" id="editBirthDate">
                    </div>
                    <div class="form-group">
                        <label>Место рождения</label>
                        <input type="text" id="editBirthPlace" placeholder="Город, страна">
                    </div>
                    <div class="form-group">
                        <label>Дата смерти</label>
                        <input type="date" id="editDeathDate">
                    </div>
                    <div class="form-group">
                        <label>Место смерти</label>
                        <input type="text" id="editDeathPlace" placeholder="Город, страна">
                    </div>
                    <div class="form-group">
                        <label>Биография</label>
                        <textarea id="editBiography" rows="4" placeholder="Краткая биография..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>Фото (URL)</label>
                        <input type="url" id="editPhoto" placeholder="https://...">
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Сохранить</button>
                        <button type="button" class="btn btn-outline" id="btnCancelEdit">Отмена</button>
                    </div>
                </form>
            </div>
        </aside>
    </main>

    <!-- Add Relative Modal -->
    <div class="modal-overlay" id="addRelativeModal" style="display: none;">
        <div class="modal">
            <div class="modal-header">
                <h3>Добавить родственника</h3>
                <button class="modal-close" id="btnCloseModal">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="relation-options" id="relationOptions">
                    <button class="relation-option" data-relation="father">
                        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        <span>Отец</span>
                    </button>
                    <button class="relation-option" data-relation="mother">
                        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        <span>Мать</span>
                    </button>
                    <button class="relation-option" data-relation="spouse">
                        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
                        </svg>
                        <span>Супруг(а)</span>
                    </button>
                    <button class="relation-option" data-relation="son">
                        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        <span>Сын</span>
                    </button>
                    <button class="relation-option" data-relation="daughter">
                        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        <span>Дочь</span>
                    </button>
                    <button class="relation-option" data-relation="brother">
                        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                            <circle cx="9" cy="7" r="4"/>
                            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                        </svg>
                        <span>Брат</span>
                    </button>
                    <button class="relation-option" data-relation="sister">
                        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                            <circle cx="9" cy="7" r="4"/>
                            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                        </svg>
                        <span>Сестра</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- New Person Quick Form Modal -->
    <div class="modal-overlay" id="newPersonModal" style="display: none;">
        <div class="modal">
            <div class="modal-header">
                <h3 id="newPersonTitle">Новая персона</h3>
                <button class="modal-close" id="btnCloseNewPerson">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <form id="newPersonForm">
                    <div class="form-group">
                        <label>Имя *</label>
                        <input type="text" id="newFirstName" placeholder="Введите имя" required>
                    </div>
                    <div class="form-group">
                        <label>Фамилия</label>
                        <input type="text" id="newLastName" placeholder="Введите фамилию">
                    </div>
                    <div class="form-group">
                        <label>Пол</label>
                        <div class="gender-selector">
                            <button type="button" class="gender-btn" data-gender="male" id="newGenderMale">М</button>
                            <button type="button" class="gender-btn" data-gender="female" id="newGenderFemale">Ж</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Дата рождения</label>
                        <input type="date" id="newBirthDate">
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Добавить</button>
                        <button type="button" class="btn btn-outline" id="btnCancelNewPerson">Отмена</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Confirm Modal -->
    <div class="modal-overlay" id="confirmModal" style="display: none;">
        <div class="modal modal-sm">
            <div class="modal-header">
                <h3 id="confirmTitle">Подтверждение</h3>
            </div>
            <div class="modal-body">
                <p id="confirmMessage"></p>
                <div class="form-actions">
                    <button class="btn btn-danger" id="btnConfirmYes">Да</button>
                    <button class="btn btn-outline" id="btnConfirmNo">Отмена</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>

    <script src="js/data-manager.js"></script>
    <script src="js/tree-renderer.js"></script>
    <script src="js/person-editor.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
